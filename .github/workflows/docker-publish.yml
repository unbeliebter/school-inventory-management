name: Publish Docker Image on Tag

on:
  push:
    tags:
      - 'v*' # Trigger reagiert nur auf Tags wie v1.0, v2.1.3, etc.
  workflow_dispatch:

jobs:
  push_to_registry:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      # Extrahiert Metadaten (Tags, Labels) für Docker
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/school-inventory-management
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Hier werden die automatisch generierten Tags genutzt
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}