<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<header th:fragment="header">
    <nav class="top-nav">
        <div class="left">
            <button onclick="toggleMenu()" class="img-btn"><img th:src="@{/icons/menu.svg}" title="Menu" alt="menu"></button>
        </div>

        <h2 class="mid">Inventarübersicht</h2>
        <div class="right">
            <a th:href="@{/userProfile}" class="img-btn"><img th:src="@{/icons/user.svg}" title="Profil" alt="profile"></a>
            <a th:href="@{/logout}"  ><img class="img-btn" th:src="@{/icons/log-out.svg}" title="Log out" alt="log-out"></a>
        </div>
    </nav>
</header>


<nav th:fragment="sideBar" id="nav-sidebar" open="false">
    <div>
        <h2 class="menu-title">Menü</h2>
    </div>


    <div class="menu-items">
        <div class="menu-item">
            <button class="button-link"><a th:href="@{/inventory}">Inventar</a></button>
        </div>
        <div sec:authorize="hasAuthority('ADMIN')" class="menu-item">
            <button class="button-link"><a th:href="@{/units}">Abteilungen</a></button>
        </div>
        <div sec:authorize="hasAuthority('ADMIN')" class="menu-item">
            <button class="button-link"><a th:href="@{/groups}">Gruppen</a></button>
        </div>
        <div sec:authorize="hasAuthority('ADMIN')" class="menu-item">
            <button class="button-link"><a th:href="@{/subjects}">Fächer</a></button>
        </div>
        <div sec:authorize="hasAuthority('ADMIN')" class="menu-item">
            <button class="button-link"><a th:href="@{/users}">Nutzer</a></button>
        </div>
        <div sec:authorize="hasAuthority('ADMIN')" class="menu-item">
            <button class="button-link"><a th:href="@{/positions}">Orte</a></button>
        </div>
    </div>
    <div class="menu-logout">
        <button class="button-link"><a th:href="@{/logout}">Ausloggen</a></button>
    </div>
</nav>

<div th:fragment="table-control-header" class="container-inventory-form">
    <button class="img-btn" id="openFilterDialogButton"><img th:src="@{/icons/filter.svg}" title="Filter" alt="filter"></button>
    <button class="img-btn" id="openColumnFilter"><img th:src="@{/icons/eye.svg}" title="Spalten filtern" alt="column filter"></button>
    <button sec:authorize="hasAnyAuthority('ADMIN', 'SENIOR_RESPONSIBLE')" class="img-btn" id="openEquipmentDialogButton"><img th:src="@{/icons/plus-circle.svg}"
                                                                title="Hinzufügen" alt="add">
    </button>
    <div class="right">
        <form th:action="${Path} + '/export'" th:object="${DTO}">
            <input th:field="*{list}" type="hidden"/>
            <button type="submit" alt="Export" title="Exportieren als CSV" class="button-link">Exportieren</button>
        </form>
    </div>
</div>

<td th:fragment="table-data-button-cell" th:if="${currentUserRole == 'ADMIN'} OR ${currentUserRole == 'SENIOR_RESPONSIBLE'} OR ${currentUserId} == ${item.responsibleUser.id}" class="btn-cell">
    <div class="container-table-buttons">
        <button th:value="${item.id}" onclick="editTableItem(this.getAttribute('value'))" class="img-btn"><img th:src="@{/icons/edit.svg}" title="Edit Entry" alt="edit"></button>
        <button th:if="${currentUserRole == 'ADMIN'}" type="button"  onclick="deleteTableEntry(this.getAttribute('data-id'), this)"  th:attr="data-id=${item.id}" class="img-btn"><img th:src="@{/icons/trash-2.svg}" title="Delete Entry" alt="delete"></button>
    </div>
</td>
<td th:fragment="table-data-button-cell" th:unless="${currentUserRole == 'ADMIN'} OR ${currentUserId} == ${item.responsibleUser.id}"></td>


<script th:fragment="table-script" th:inline="javascript">
    let tableItems = [[${TableItems}]];
    const allItems = [[${allItems}]];
    const newTableItemId = [[${newTableItemId}]];
    const PATH = [[${Path}]];
</script>


</body>
</html>
