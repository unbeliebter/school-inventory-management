<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<link th:href="@{/css/main.css}" type="text/css" rel="stylesheet">

<dialog id="itemDialog" closedBy="any">
    <form method="post" th:action="${Path} + '/addWithRole'" th:object="${newTableItem}">
        <input type="hidden" th:name="tableItemId" id="id-input" th:value="*{id}"/>
        <div class="dialog-main-container">
            <div>
                <h3>Add User</h3>
            </div>
            <label id="add-Item-Error" class="error" shown="false"></label>
            <div class="label-with-input-horizontal">
                <label>Username:</label>
                <input th:field="*{username}" maxLength="40" id="username-input" class="dialog-input" type="text" min="1" minlength="1"
                       required>
            </div>
            <div class="label-with-input-horizontal">
                <label>Vorname:</label>
                <input th:field="*{firstname}" maxLength="32" id="firstname-input" class="dialog-input" type="text" min="1" minlength="1"
                       required>
            </div>
            <div class="label-with-input-horizontal">
                <label>Nachname:</label>
                <input th:field="*{lastname}" maxLength="32" id="lastname-input" class="dialog-input" type="text" min="1" minlength="1"
                       required>
            </div>
            <div class="label-with-input-horizontal">
                <label>E-Mail:</label>
                <input th:field="*{email}" maxlength="32" id="email-input" class="dialog-input" type="text" min="1" minlength="1"
                       required>
            </div>
            <div class="label-with-input-horizontal">
                <label>Rolle:</label>
                <select th:name="roleId" id="userType-input" class="dialog-input">
                    <option th:each="role : ${Roles}"
                            th:value="${role.frontendName}"
                            th:text="${role.frontendName}">
                    </option>
                </select>
            </div>
            <div class="dialog-button-row">
                <button class="submit" onclick="createUser()" type="button">Speichern</button>
                <button class="cancel" id="item-dialog-cancel-button" type="reset">Abbrechen</button>
            </div>

        </div>

    </form>
</dialog>

<dialog id="filterDialog" closedBy="any">
    <form id="filter-dialog-form" method="GET" th:action="${Path}">
        <input type="hidden" th:name="filter" th:value="true"/>
        <div class="dialog-main-container">
            <div>
                <h3>Add Filter Option</h3>
            </div>
            <div class="label-with-input-horizontal">
                <label>Nutzername:</label>
                <select th:name="username" class="dialog-input">
                    <option selected="selected" th:value="null" th:text="null"></option>
<!--                    <option th:each="item : ${TableItems}" th:value="${item.username}" th:text="${item.username}"></option>-->
                </select>
            </div>
            <div class="label-with-input-horizontal">
                <label>Vorname:</label>
                <select th:name="firstname" class="dialog-input">
                    <option selected="selected" th:value="null" th:text="null"></option>
<!--                    <option th:each="item : ${TableItems}" th:value="${item.firstname}" th:text="${item.firstname}"></option>-->
                </select>
            </div>
            <div class="label-with-input-horizontal">
                <label>Nachname:</label>
                <select th:name="lastname" class="dialog-input">
                    <option selected="selected" th:value="null" th:text="null"></option>
<!--                    <option th:each="item : ${TableItems}" th:value="${item.lastname}" th:text="${item.lastname}"></option>-->
                </select>
            </div>
            <div class="label-with-input-horizontal">
                <label>E-Mail:</label>
                <select th:name="email" class="dialog-input">
                    <option selected="selected" th:value="null" th:text="null"></option>
<!--                    <option th:each="item : ${TableItems}" th:value="${item.email}" th:text="${item.email}"></option>-->
                </select>
            </div>
            <div class="label-with-input-horizontal">
                <label>Rolle:</label>
                <select th:name="frontendName" class="dialog-input">
                    <option selected="selected" th:value="null" th:text="null"></option>
                    <option th:each="item : ${TableItems}" th:value="${item.role.frontendName}" th:text="${item.role.frontendName}"></option>
                </select>
            </div>
            <div class="label-with-input-horizontal">
                <label>Passwort-Angefordert:</label>
                <select th:name="pwResetRequested" class="dialog-input">
                    <option selected="selected" th:value="null" th:text="null"></option>
                    <option th:value="false" th:text="Nein"></option>
                    <option th:value="true" th:text="Ja"></option>
                </select>
            </div>

            <div class="dialog-button-row">
                <button  class="submit" type="submit">Speichern</button>
                <button class="cancel" id="filter-dialog-cancel-button" type="reset">Abbrechen</button>
            </div>

        </div>

    </form>
</dialog>


<body>
<header th:replace="~{fragments.html :: header}"> </header>

<section class="section-content">
    <nav th:replace="~{fragments.html :: sideBar}"></nav>

    <div class="container-content">
        <div th:replace="~{fragments.html :: table-control-header}"></div>
        <div class="container-inventory-table">
            <table>
                <caption class="table-inventory-caption">
                    Nutzer
                </caption>
                <thead class="">
                    <tr class="">
                        <th scope="col">Nutzername</th>
                        <th scope="col">Vorname</th>
                        <th scope="col">Nachname</th>
                        <th scope="col">E-Mail</th>
                        <th scope="col">Rolle</th>
                        <th class="table-head-buttons" scope="col"></th>
                    </tr>
                </thead>
                <tbody>
                <tr th:attr="pw-reset-requested=${item.requiresPasswordReset}" class="" th:each="item : ${TableItems}">
                    <td><span th:text="${item.username}"></span></td>
                    <td><span th:text="${item.firstname}"></span></td>
                    <td><span th:text="${item.lastname}"></span></td>
                    <td><span th:text="${item.email}"></span></td>
                    <td><span th:text="${item.role.frontendName}"></span></td>
                    <td sec:authorize="hasAnyAuthority('ADMIN', 'RESPONSIBLE')" class="btn-cell">
                        <div class="container-table-buttons">
                            <button th:value="${item.id}" onclick="editTableItem(this.getAttribute('value'))" class="img-btn"><img th:src="@{/icons/edit.svg}" title="Edit Entry" alt="edit"></button>
                            <button type="button"  onclick="deleteTableEntry_CST(this.getAttribute('data-id'), this)"  th:attr="data-id=${item.id}" class="img-btn"><img th:src="@{/icons/trash-2.svg}" title="Delete Entry" alt="delete"></button>
                            <button type="button" onclick="resetPasswordOfSelectedUser(this.getAttribute('data-id'), this.getAttribute('data-username'), this)" th:attr="data-id=${item.id},data-username=${item.username}" class="button-link">
                                Passwort zurücksetzen
                            </button>
                            <button th:if="${item.requiresPasswordReset}" type="button" onclick="removePwResetFlag(this.getAttribute('data-id'), this)" th:attr="data-id=${item.id}" class="button-link">
                                <img th:src="@{/icons/bell-off.svg}" title="Markierung entfernen" alt="Remove Flag">
                            </button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>

</body>
<script th:replace="~{fragments.html :: table-script}"></script>
<script type="text/javascript" th:src="@{/js/Dialogs/NotificationDialog.js}"></script>
<script type="text/javascript" th:src="@{/js/inventory.js}"></script>
<script type="text/javascript" th:src="@{/js/users/users.js}"></script>
<script type="text/javascript" th:src="@{/js/Dialogs/userDialog.js}"></script>
</html>
