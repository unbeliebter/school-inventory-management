 <!DOCTYPE html>
 <html xmlns:th="https://www.thymeleaf.org" lang="en">
<head>
    <link rel="stylesheet" th:href="@{/css/login.css}">

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inventarverwaltung</title>
</head>

<body>
    <header>
        <h2>Inventarübersicht</h2>
    </header>

    <main>
        <div>
            <div id="login-card" class="container-login-card">
                <div class="container-back-button">
                    <a id="back-arrow-link" th:href="@{/inventory}" title="Zurück" class="button-link back-arrow"><img class="back-arrow" th:src="@{/icons/arrow-left-circle.svg}"><span>Zurück</span></a>
                </div>

                <div class="login-card-top">
                    <label class="login-header">Geben sie ihren Nutzernamen an</label>
                    <img class="logo" th:src="@{/icons/LogoTransparent.png}">
                </div>
                <div th:if="${errorUnknownUser}">
                    Nutzername ist nicht bekannt(Wenn auch vergessen dann Admin persönlich ansprechen)!</div>
                <div class="login-card-input">
                    <label for="username-input">Nutzername</label>
                    <input id="username-input" name="username" maxlength="40" type="text">
                </div>
                <button onclick="sendPasswordResetRequest()" type="button" value="Log in" class="login-submit">Senden</button>
            </div>
        </div>


    </main>
<script>
    document.getElementById("login-card").addEventListener("keydown", (e) => {
        switch (e.key) {
            case "Enter" :
                sendPasswordResetRequest();
        }
    });

</script>
    
</body>
<script type="text/javascript" th:src="@{/js/Dialogs/NotificationDialog.js}"></script>
<script type="text/javascript" th:src="@{/js/login/login.js}"></script>
</html>
